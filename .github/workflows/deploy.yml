name: Sync to Hugging Face Hub

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libsndfile1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest

  sync-to-hub:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          # Detect the current branch name
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          echo "Deploying branch '$BRANCH' to Hugging Face Space: $HF_SPACE"

          git remote add space https://user:$HF_TOKEN@huggingface.co/spaces/$HF_SPACE || true
          git push --force space $BRANCH:main

          echo "✅ Successfully deployed to https://huggingface.co/spaces/$HF_SPACE"
